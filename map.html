<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Map - CivicFix</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Firebase compat SDK CDNs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
  
  <!-- Leaflet CSS/JS via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    /* Custom map layout overrides */
    .map-wrapper {
      display: grid;
      grid-template-columns: 350px 1fr;
      height: calc(100vh - 70px);
      overflow: hidden;
    }
    
    .map-sidebar {
      background-color: white;
      border-right: 1px solid var(--border-light);
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .map-container-area {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #public-map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    .sidebar-issue-card {
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .sidebar-issue-card:hover {
      background-color: var(--light-bg);
      border-color: var(--primary);
    }
    
    .legend {
      padding: 0.75rem;
      background: white;
      box-shadow: var(--shadow-md);
      border-radius: var(--radius-sm);
      line-height: 1.5;
      font-size: 0.8rem;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    @media (max-width: 768px) {
      .map-wrapper {
        grid-template-columns: 1fr;
        grid-template-rows: 250px 1fr;
        height: auto;
      }
      .map-sidebar {
        order: 2;
        height: 400px;
        border-right: none;
        border-top: 1px solid var(--border-light);
      }
      .map-container-area {
        order: 1;
        height: 450px;
      }
    }
  </style>
</head>
<body>
  <!-- Dynamic Navigation Bar Injected by auth.js -->
  <div id="navbar-container"></div>

  <div class="map-wrapper">
    <!-- Sidebar Panel: Controls & List -->
    <aside class="map-sidebar">
      <div>
        <h3 style="font-weight:800; color:var(--primary); font-size:1.4rem;">Issue Directory</h3>
        <p style="color:var(--text-muted-dark); font-size:0.8rem;">Browse reported community issues on the map.</p>
      </div>

      <!-- Filters Form -->
      <div style="display:flex; flex-direction:column; gap:0.75rem; padding-bottom:1rem; border-bottom:1px solid var(--border-light);">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" style="font-size:0.8rem;">Filter by Category</label>
          <select id="map-filter-category" class="form-control form-select" style="padding:0.5rem 0.75rem; font-size:0.85rem;">
            <option value="ALL">All Categories</option>
            <option value="Pothole">Pothole</option>
            <option value="Garbage">Garbage</option>
            <option value="Streetlight">Streetlight</option>
            <option value="Sewage/Water Leakage">Sewage/Water Leakage</option>
            <option value="Other">Other</option>
          </select>
        </div>
        
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" style="font-size:0.8rem;">Filter by Status</label>
          <select id="map-filter-status" class="form-control form-select" style="padding:0.5rem 0.75rem; font-size:0.85rem;">
            <option value="ALL">All Statuses</option>
            <option value="Submitted">Submitted</option>
            <option value="Acknowledged">Acknowledged</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
      </div>

      <!-- Counters in Sidebar -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; text-align:center;">
        <div style="background-color:var(--light-bg); padding:0.5rem; border-radius:var(--radius-sm);">
          <div style="font-size:1.2rem; font-weight:700; color:var(--primary);" id="sidebar-count-active">0</div>
          <div style="font-size:0.7rem; font-weight:600; color:var(--text-muted-dark); text-transform:uppercase;">Active</div>
        </div>
        <div style="background-color:var(--light-bg); padding:0.5rem; border-radius:var(--radius-sm);">
          <div style="font-size:1.2rem; font-weight:700; color:var(--success);" id="sidebar-count-resolved">0</div>
          <div style="font-size:0.7rem; font-weight:600; color:var(--text-muted-dark); text-transform:uppercase;">Resolved</div>
        </div>
      </div>

      <!-- Scrollable Issues Directory List -->
      <div style="flex-grow:1; display:flex; flex-direction:column; gap:0.75rem; overflow-y:auto;" id="sidebar-issues-list">
        <p style="text-align:center; color:var(--text-muted-dark); font-size:0.85rem; padding:2rem 0;">
          No reports found.
        </p>
      </div>
    </aside>

    <!-- Map Area -->
    <main class="map-container-area">
      <div id="public-map"></div>
    </main>
  </div>

  <!-- External JS Modules -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
