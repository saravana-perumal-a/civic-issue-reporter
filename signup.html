<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CivicFix</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase compat SDK CDNs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
</head>
<body>
  <!-- Dynamic Navigation Bar Injected by auth.js -->
  <div id="navbar-container"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Citizen Registration</h2>
        <p>Sign up to start reporting issues in your neighborhood and tracking resolving status.</p>
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <input type="email" id="signup-email" class="form-control" placeholder="john@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-control" placeholder="minimum 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-confirm-password">Confirm Password</label>
          <input type="password" id="signup-confirm-password" class="form-control" placeholder="re-enter password" required autocomplete="new-password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Create Account
        </button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <span style="color: var(--text-muted-dark)">Already have an account?</span>
        <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.25rem;">Sign In instead</a>
      </div>
    </div>
  </div>

  <!-- External JS Modules -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // Handle form submissions
    document.getElementById("signup-form").addEventListener("submit", (e) => {
      e.preventDefault();
      
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const confirmPassword = document.getElementById("signup-confirm-password").value;
      
      if (password !== confirmPassword) {
        showToast("Passwords do not match!", "error");
        return;
      }
      
      registerCitizen(name, email, password);
    });
  </script>
</body>
</html>
