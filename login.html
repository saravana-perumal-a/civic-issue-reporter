<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CivicFix</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase compat SDK CDNs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
</head>
<body>
  <!-- Dynamic Navigation Bar Injected by auth.js -->
  <div id="navbar-container"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Access your CivicFix dashboard to report, resolve, or monitor civic issues.</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="enter your registered email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign In
        </button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <span style="color: var(--text-muted-dark)">New to the portal?</span>
        <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.25rem;">Register as Citizen</a>
      </div>
      
      <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border-light); font-size: 0.8rem; color: var(--text-muted-dark); text-align: center;">
        <p>Testing accounts (Admin promoted):</p>
        <p style="font-family: monospace;">citizen@civicfix.com | officer@civicfix.com | admin@civicfix.com</p>
      </div>
    </div>
  </div>

  <!-- External JS Modules -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // Handle form submissions
    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      
      loginUser(email, password);
    });
  </script>
</body>
</html>
