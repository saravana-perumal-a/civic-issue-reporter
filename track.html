<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Issues - CivicFix</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase compat SDK CDNs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
</head>
<body>
  <!-- Dynamic Navigation Bar Injected by auth.js -->
  <div id="navbar-container"></div>

  <main class="container">
    <div style="margin-bottom: 2rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
      <div>
        <h2 style="font-size: 2rem; color: var(--primary); font-weight: 800;">My Reported Issues</h2>
        <p style="color: var(--text-muted-dark)">Track the status of your reports in real-time. Status changes are pushed automatically.</p>
      </div>
      <a href="report.html" class="btn btn-primary">➕ Report New Issue</a>
    </div>

    <!-- Issues Container -->
    <div id="issues-list-container">
      <div class="card" style="text-align: center; padding: 3rem;">
        <span style="font-size: 2rem;">🔄</span>
        <p style="margin-top: 1rem; color: var(--text-muted-dark);">Loading your reported issues...</p>
      </div>
    </div>
  </main>

  <!-- External JS Modules -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/track.js"></script>
</body>
</html>
